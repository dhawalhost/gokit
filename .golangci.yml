version: "2"

linters:
  enable:
    - errcheck
    - gosec
    - govet
    - staticcheck
    - revive
    - unparam
    - bodyclose
    - misspell
    - godot

  settings:
    revive:
      rules:
        - name: exported
          severity: warning

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
