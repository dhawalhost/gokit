linters:
  enable:
    - errcheck
    - gosec
    - govet
    - staticcheck
    - revive
    - gofmt
    - goimports
    - exhaustive
    - unparam
    - bodyclose
    - noctx

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
